name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # 1. 构建作业：只负责编译和上传工作流附件
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: amd64
          - target: aarch64-pc-windows-msvc
            arch: arm64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # AMD64: 原生 MSVC 编译，零配置
      - name: Build (AMD64)
        if: matrix.arch == 'amd64'
        run: cargo build --release --target ${{ matrix.target }}

      # ARM64: 需要 llvm-tools (提供 lld-link) + cargo-xwin (提供 ARM64 CRT/SDK)
      - name: Install ARM64 cross-compile tools
        if: matrix.arch == 'arm64'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-xwin

      - name: Add llvm-tools for ARM64 linker
        if: matrix.arch == 'arm64'
        run: rustup component add llvm-tools

      - name: Add rust-lld to PATH (ARM64 only)
        if: matrix.arch == 'arm64'
        shell: bash
        run: |
          SYSROOT="$(rustc --print sysroot)"
          HOST="$(rustc -vV | grep host | cut -d' ' -f2)"
          echo "${SYSROOT}/lib/rustlib/${HOST}/bin" >> "$GITHUB_PATH"

      - name: Build (ARM64)
        if: matrix.arch == 'arm64'
        run: cargo xwin build --release --target ${{ matrix.target }}

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Rename binary
        id: rename
        shell: bash
        run: |
          VER="${{ steps.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          BIN="which-${VER}-windows-${ARCH}.exe"
          mv "target/${{ matrix.target }}/release/which.exe" "${BIN}"
          echo "asset_name=${BIN}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: which-${{ steps.version.outputs.version }}-windows-${{ matrix.arch }}
          path: ${{ steps.rename.outputs.asset_name }}

      # 验证产物存在
      - name: Verify binary
        shell: bash
        run: |
          file "${{ steps.rename.outputs.asset_name }}" || true
          ls -lh "${{ steps.rename.outputs.asset_name }}"

  # 2. 发布作业：等待所有构建完成，下载附件并统一发布
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/which-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
